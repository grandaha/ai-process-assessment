name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release, e.g. v2.7.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - name: Verify tag matches manifest version
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          TAG_VERSION="${TAG#v}"
          MANIFEST_VERSION="$(python3 -c "import json;print(json.load(open('.claude-plugin/plugin.json'))['version'])")"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag $TAG (version $TAG_VERSION) != plugin.json version $MANIFEST_VERSION"
            exit 1
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Build release zip
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          git archive --format=zip -o "ai-process-assessment-${TAG}.zip" "$TAG"

      - name: Extract release notes
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          # Notes come from the canonical default-branch CHANGELOG and the current
          # extractor — never the tag's tree. Tags cut before the release tooling
          # existed (or before a CHANGELOG section was written) don't carry either,
          # and the default-branch CHANGELOG is the single source of truth for every
          # version's notes. The zip (built above) is the tagged code; these notes
          # describe it using current tooling. Overlay only these two paths so the
          # already-built zip is untouched.
          git fetch --depth=1 origin "${DEFAULT_BRANCH:?DEFAULT_BRANCH is unset}"
          git checkout "origin/$DEFAULT_BRANCH" -- CHANGELOG.md .github/scripts/extract_changelog.py
          python3 .github/scripts/extract_changelog.py "${TAG#v}" > RELEASE_NOTES.md
          echo "----- notes -----"; cat RELEASE_NOTES.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          ASSET="ai-process-assessment-${TAG}.zip"
          if gh release view "$TAG" >/dev/null 2>&1; then
            # Re-release (recovery / re-run): refresh the asset and notes, but
            # leave the title alone — existing releases may carry a curated,
            # human-written title that the plain tag would flatten.
            gh release upload "$TAG" "$ASSET" --clobber
            gh release edit "$TAG" --notes-file RELEASE_NOTES.md
          else
            # First release of this tag: title defaults to the tag.
            gh release create "$TAG" "$ASSET" --title "$TAG" --notes-file RELEASE_NOTES.md
          fi
