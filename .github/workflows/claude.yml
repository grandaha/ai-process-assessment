name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only run when someone writes "@claude" in a comment, review, or issue.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write          # let Claude push commits if asked
      pull-requests: write     # post reviews / comments on PRs
      issues: write            # comment on issues
      id-token: write
      actions: read            # read CI results for context
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Claude Code
        # Pinned to an explicit release — the moving v1 tag currently hits an
        # internal "tsconfig fd 4 directory mismatch" bug in the prepare step.
        uses: anthropics/claude-code-action@v1.0.140
        with:
          # Auth via Claude subscription (no API billing). Generate with
          # `claude setup-token` and store as the CLAUDE_CODE_OAUTH_TOKEN secret.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
