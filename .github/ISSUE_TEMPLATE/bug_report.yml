name: Bug report
description: Something is broken in the methodology, engine, or plugin.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in as much as you can — the more context, the faster we can reproduce and fix it.

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where are you running the plugin?
      options:
        - Claude Code (CLI)
        - Claude Cowork (desktop app)
        - Claude.ai Projects
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. What did you do, and what went wrong?
      placeholder: "Example: The scoring skill produced a score of 0 for all opportunities even though baselines were present."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "Example: Each opportunity should have a non-zero score in at least one dimension."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the bug.
      placeholder: |
        1. Run the sample engagement
        2. Invoke scoring-opportunities
        3. All scores are 0
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Plugin version, error messages, relevant skill or agent name, etc.
    validations:
      required: false
